<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Luxury Scene</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { font-family: 'Montserrat', sans-serif; color: var(--dark); background: var(--white); overflow-x: hidden !important; width: 100% !important; position: relative !important; margin: 0 !important; padding: 0 !important; }
  canvas { display: block; width: 100% !important; height: 100% !important; cursor: grab; }
  canvas:active { cursor: grabbing; }
  #hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-family: Georgia, serif;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(201,168,76,0.6);
    pointer-events: none;
    animation: fadeHint 3s ease 2.5s forwards;
    opacity: 1;
  }
  @keyframes fadeHint { to { opacity: 0; } }
@media (max-width: 768px) {
  /* --- GLOBAL MOBILE ROBUST LOCK --- */
  * { max-width: 100% !important; box-sizing: border-box !important; }
  
  html, body { overflow-x: hidden !important; width: 100% !important; position: relative !important; margin: 0 !important; padding: 0 !important; }

  /* Global Centering & Spacing */
  section { padding: 40px 20px !important; text-align: center !important; overflow: hidden !important; width: 100% !important; }
  .header { padding: 100px 20px 40px !important; text-align: center !important; }
  .container { padding: 0 20px !important; width: 100% !important; max-width: 100% !important; }
  .section-title { text-align: center !important; font-size: 26px !important; margin-bottom: 24px !important; }
  p, h1, h2, h3, h4, h5, h6, span, li, a { text-align: center !important; max-width: 100% !important; word-wrap: break-word !important; }

  /* Hero & Buttons */
  #hero, #prop-hero { height: auto !important; min-height: 60vh !important; padding: 120px 20px 60px !important; display: flex !important; flex-direction: column !important; align-items: center !important; justify-content: center !important; gap: 20px !important; width: 100% !important; }
  .hero-content, .prop-hero-content { max-width: 100% !important; padding: 0 !important; width: 100% !important; }
  .hero-title, .ph-title { font-size: 30px !important; line-height: 1.2 !important; }
  .hero-buttons, .ph-buttons, .prop-hero-buttons { flex-direction: column !important; width: 100% !important; gap: 12px !important; align-items: center !important; }
  .btn-primary, .btn-outline, .btn-gallery, .nav-cta { width: 100% !important; max-width: 320px !important; justify-content: center !important; margin: 0 auto !important; }

  /* Search Filter - Force Vertical Stack */
  .search-filter-wrap { margin-top: -40px !important; padding: 0 20px !important; width: 100% !important; max-width: 100% !important; }
  .search-filter { flex-direction: column !important; gap: 10px !important; padding: 15px !important; border-radius: 15px !important; width: 100% !important; border: 1px solid rgba(201,168,76,0.2) !important; background: rgba(0,0,0,0.8) !important; }
  .filter-select, .filter-btn { width: 100% !important; margin: 0 !important; }

  /* Property Grid - Single Column */
  .props-grid, .similar-grid { display: flex !important; flex-direction: column !important; gap: 20px !important; padding: 0 10px !important; width: 100% !important; }
  .prop-card, .sim-card { width: 100% !important; flex: none !important; margin: 0 auto !important; max-width: 100% !important; }
  .prop-img-wrap, .sim-img, .prop-img, .prop-img-placeholder { aspect-ratio: 16/9 !important; height: auto !important; width: 100% !important; }
  .prop-info, .sim-info { padding: 20px !important; text-align: center !important; }

  /* Stats Bar - 2-Column Grid */
  #stats, .quick-stats { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 10px !important; padding: 20px !important; width: 100% !important; }
  .stat, .qs-item { width: 100% !important; border: none !important; border-bottom: 1px solid rgba(255,255,255,0.1) !important; padding: 15px 5px !important; margin: 0 !important; }
  .stat:last-child, .qs-item:last-child { border-bottom: none !important; }

  /* About & Markets - Vertical Stack */
  #about { display: flex !important; flex-direction: column !important; gap: 0 !important; padding: 0 !important; width: 100% !important; }
  .about-image-wrap { width: 100% !important; order: 1 !important; }
  .about-video { height: 240px !important; width: 100% !important; }
  .about-text { order: 2 !important; padding: 40px 24px !important; width: 100% !important; }
  
  #markets { display: flex !important; flex-direction: column !important; gap: 0 !important; width: 100% !important; }
  .market-panel { width: 100% !important; min-height: 350px !important; padding: 40px 20px !important; }

  /* Footer & Banner */
  footer { padding: 40px 20px !important; width: 100% !important; }
  .footer-grid { grid-template-columns: 1fr !important; gap: 30px !important; width: 100% !important; }
  .footer-brand { align-items: center !important; }
  .footer-bottom { flex-direction: column !important; gap: 10px !important; }
  #fc-banner { flex-direction: column !important; gap: 15px !important; padding: 30px 20px !important; width: 100% !important; }

  /* Fix for Horizontal Carousels */
  .services-grid, .testimonials-grid { width: 100% !important; overflow-x: auto !important; -webkit-overflow-scrolling: touch !important; padding-bottom: 20px !important; display: flex !important; flex-wrap: nowrap !important; }
  .service-card, .testi-card { flex: 0 0 85% !important; margin-right: 15px !important; }
}
</style>
</head>
<body>
<div id="hint">Drag to rotate</div>
<script src="./three.min.js"></script>
<script>
// ── SCENE SETUP ──
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.2, 5.5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

// ── MATERIALS ──
const goldMat = new THREE.MeshStandardMaterial({
  color: 0xC9A84C,
  metalness: 0.95,
  roughness: 0.18,
  envMapIntensity: 1.6
});
const goldDarkMat = new THREE.MeshStandardMaterial({
  color: 0x9A7C35,
  metalness: 0.9,
  roughness: 0.28,
  envMapIntensity: 1.2
});
const marbleMat = new THREE.MeshStandardMaterial({
  color: 0x111111,
  metalness: 0.1,
  roughness: 0.05,
  envMapIntensity: 0.8
});
const glassMat = new THREE.MeshStandardMaterial({
  color: 0x88BBDD,
  metalness: 0.05,
  roughness: 0.05,
  transparent: true,
  opacity: 0.35,
  envMapIntensity: 2.0
});

// ── ENVIRONMENT MAP (procedural gradient sky for reflections) ──
const pmremGenerator = new THREE.PMREMGenerator(renderer);
pmremGenerator.compileEquirectangularShader();
// Build a simple gradient env using a DataTexture
const envData = new Float32Array(4 * 64 * 32);
for (let i = 0; i < 32; i++) {
  for (let j = 0; j < 64; j++) {
    const idx = (i * 64 + j) * 4;
    const t = i / 32;
    envData[idx]   = 0.05 + t * 0.3;   // R
    envData[idx+1] = 0.04 + t * 0.22;  // G
    envData[idx+2] = 0.02 + t * 0.08;  // B
    envData[idx+3] = 1.0;
  }
}
const envDataTex = new THREE.DataTexture(envData, 64, 32, THREE.RGBAFormat, THREE.FloatType);
envDataTex.encoding = THREE.LinearEncoding;
envDataTex.needsUpdate = true;
const envMap = pmremGenerator.fromEquirectangular(envDataTex).texture;
scene.environment = envMap;
pmremGenerator.dispose();

// ── BUILD LUXURY VILLA MODEL ──
const group = new THREE.Group();

// Base / plinth (polished marble)
const baseGeo = new THREE.BoxGeometry(3.6, 0.12, 2.2);
const base = new THREE.Mesh(baseGeo, marbleMat);
base.position.y = -0.06;
base.receiveShadow = true;
group.add(base);

// Thin marble platform surround
const edgeGeo = new THREE.BoxGeometry(3.8, 0.04, 2.4);
const edge = new THREE.Mesh(edgeGeo, new THREE.MeshStandardMaterial({ color:0x1a1a1a, metalness:0.2, roughness:0.02 }));
edge.position.y = -0.12;
group.add(edge);

// ── VILLA BODY ──
// Ground floor — main body
const floorGeo = new THREE.BoxGeometry(2.8, 0.55, 1.6);
const floor = new THREE.Mesh(floorGeo, goldMat);
floor.position.set(0, 0.275, 0);
floor.castShadow = true;
floor.receiveShadow = true;
group.add(floor);

// Upper floor (slightly inset)
const upperGeo = new THREE.BoxGeometry(2.0, 0.45, 1.3);
const upper = new THREE.Mesh(upperGeo, goldMat);
upper.position.set(-0.1, 0.775, -0.05);
upper.castShadow = true;
group.add(upper);

// Flat roof
const roofGeo = new THREE.BoxGeometry(2.15, 0.07, 1.45);
const roof = new THREE.Mesh(roofGeo, goldDarkMat);
roof.position.set(-0.1, 1.015, -0.05);
group.add(roof);

// Roof overhang accent
const overhangGeo = new THREE.BoxGeometry(2.3, 0.025, 1.6);
const overhang = new THREE.Mesh(overhangGeo, new THREE.MeshStandardMaterial({ color:0x7a6128, metalness:0.8, roughness:0.3 }));
overhang.position.set(-0.1, 1.04, -0.05);
group.add(overhang);

// Roof terrace railing (thin bars)
const railMat = new THREE.MeshStandardMaterial({ color:0xC9A84C, metalness:0.95, roughness:0.15 });
for (let i = -4; i <= 4; i++) {
  const rail = new THREE.Mesh(new THREE.BoxGeometry(0.025, 0.22, 0.025), railMat);
  rail.position.set(-0.1 + i * 0.24, 1.13, 0.69);
  group.add(rail);
  const railB = new THREE.Mesh(new THREE.BoxGeometry(0.025, 0.22, 0.025), railMat);
  railB.position.set(-0.1 + i * 0.24, 1.13, -0.79);
  group.add(railB);
}
// Railing top bar
const topRailH = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.02, 0.025), railMat);
topRailH.position.set(-0.1, 1.235, 0.69);
group.add(topRailH);
const topRailB = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.02, 0.025), railMat);
topRailB.position.set(-0.1, 1.235, -0.79);
group.add(topRailB);

// ── WINDOWS (glass panels) ──
// Ground floor — large windows
const winPositions = [
  [-0.85, 0.28, 0.81], [0, 0.28, 0.81], [0.85, 0.28, 0.81]
];
winPositions.forEach(([x, y, z]) => {
  const win = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.32, 0.01), glassMat);
  win.position.set(x, y, z);
  group.add(win);
  // Window frame
  const frame = new THREE.Mesh(new THREE.BoxGeometry(0.58, 0.35, 0.015), new THREE.MeshStandardMaterial({ color:0x1a1a1a, metalness:0.5, roughness:0.2 }));
  frame.position.set(x, y, z - 0.005);
  group.add(frame);
});

// Upper floor windows
[[-0.6, 0.79, 0.61], [0.2, 0.79, 0.61]].forEach(([x, y, z]) => {
  const win = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.3, 0.01), glassMat);
  win.position.set(x, y, z);
  group.add(win);
});

// ── MAIN ENTRANCE DOOR ──
const doorGeo = new THREE.BoxGeometry(0.28, 0.42, 0.015);
const door = new THREE.Mesh(doorGeo, new THREE.MeshStandardMaterial({ color:0x1a1a1a, metalness:0.4, roughness:0.3 }));
door.position.set(1.0, 0.21, 0.81);
group.add(door);

// Door handle (gold)
const handleGeo = new THREE.BoxGeometry(0.04, 0.01, 0.01);
const handle = new THREE.Mesh(handleGeo, goldMat);
handle.position.set(0.9, 0.21, 0.815);
group.add(handle);

// ── POOL / WATER FEATURE ──
const poolGeo = new THREE.BoxGeometry(0.85, 0.04, 0.55);
const poolMat = new THREE.MeshStandardMaterial({ color:0x2266AA, metalness:0.1, roughness:0.03, transparent:true, opacity:0.75 });
const pool = new THREE.Mesh(poolGeo, poolMat);
pool.position.set(-1.25, 0.02, 0);
group.add(pool);
const poolEdge = new THREE.Mesh(new THREE.BoxGeometry(0.92, 0.03, 0.62), marbleMat);
poolEdge.position.set(-1.25, -0.01, 0);
group.add(poolEdge);

// ── PALM TREES (stylised) ──
function addPalm(x, z) {
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.04, 0.55, 8), new THREE.MeshStandardMaterial({ color:0x7a6040, roughness:0.9 }));
  trunk.position.set(x, 0.275, z);
  group.add(trunk);
  const crown = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8, 6), new THREE.MeshStandardMaterial({ color:0x2d5a1a, roughness:0.8 }));
  crown.scale.y = 0.6;
  crown.position.set(x, 0.6, z);
  group.add(crown);
}
addPalm(-1.62, 0.75);
addPalm(-1.62, -0.75);
addPalm(1.62, 0.8);

// ── DRIVEWAY ──
const driveMat = new THREE.MeshStandardMaterial({ color:0x2a2a2a, roughness:0.6, metalness:0.0 });
const drive = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.005, 1.6), driveMat);
drive.position.set(1.55, 0.0, 0);
group.add(drive);

// ── SHADOW PLANE ──
const shadowGeo = new THREE.PlaneGeometry(5, 3.5);
const shadowMat = new THREE.ShadowMaterial({ opacity: 0.35 });
const shadowPlane = new THREE.Mesh(shadowGeo, shadowMat);
shadowPlane.rotation.x = -Math.PI / 2;
shadowPlane.position.y = -0.13;
shadowPlane.receiveShadow = true;
scene.add(shadowPlane);

group.position.set(0, -0.3, 0);
scene.add(group);

// ── CINEMATIC LIGHTING ──
// Key light (warm golden)
const keyLight = new THREE.DirectionalLight(0xFFF5E0, 2.8);
keyLight.position.set(6, 8, 5);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 2048;
keyLight.shadow.mapSize.height = 2048;
keyLight.shadow.camera.near = 0.5;
keyLight.shadow.camera.far = 25;
keyLight.shadow.camera.left = -5;
keyLight.shadow.camera.right = 5;
keyLight.shadow.camera.top = 5;
keyLight.shadow.camera.bottom = -5;
keyLight.shadow.radius = 6;
keyLight.shadow.bias = -0.001;
scene.add(keyLight);

// Fill light (cool blue)
const fillLight = new THREE.DirectionalLight(0xB0C8FF, 0.7);
fillLight.position.set(-5, 3, -3);
scene.add(fillLight);

// Rim light (warm gold accent)
const rimLight = new THREE.DirectionalLight(0xFFCC55, 1.1);
rimLight.position.set(2, -1, -5);
scene.add(rimLight);

// Ambient (very subtle)
const ambient = new THREE.AmbientLight(0xFFFFFF, 0.25);
scene.add(ambient);

// ── PARTICLE DUST ──
const particleCount = 120;
const positions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  positions[i * 3] = (Math.random() - 0.5) * 6;
  positions[i * 3 + 1] = (Math.random() - 0.5) * 3;
  positions[i * 3 + 2] = (Math.random() - 0.5) * 4;
}
const particleGeo = new THREE.BufferGeometry();
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particleMat = new THREE.PointsMaterial({ color: 0xC9A84C, size: 0.012, transparent: true, opacity: 0.3 });
scene.add(new THREE.Points(particleGeo, particleMat));

// ── DRAG ROTATION ──
let isDragging = false;
let prevX = 0, prevY = 0;
let rotY = 0.3, rotX = 0.1;
let velX = 0, velY = 0;

const canvas = renderer.domElement;
canvas.addEventListener('mousedown', e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; velX = 0; velY = 0; });
window.addEventListener('mouseup', () => { isDragging = false; });
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevX;
  const dy = e.clientY - prevY;
  velX = dy * 0.01;
  velY = dx * 0.012;
  rotX += velX;
  rotY += velY;
  rotX = Math.max(-0.55, Math.min(0.55, rotX));
  prevX = e.clientX;
  prevY = e.clientY;
});
// Touch
canvas.addEventListener('touchstart', e => { isDragging = true; prevX = e.touches[0].clientX; prevY = e.touches[0].clientY; });
window.addEventListener('touchend', () => { isDragging = false; });
window.addEventListener('touchmove', e => {
  if (!isDragging) return;
  const dx = e.touches[0].clientX - prevX;
  const dy = e.touches[0].clientY - prevY;
  velX = dy * 0.01; velY = dx * 0.012;
  rotX += velX; rotY += velY;
  rotX = Math.max(-0.55, Math.min(0.55, rotX));
  prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
}, { passive: true });

// Hover subtle tilt
let hoverX = 0, hoverY = 0, targetHX = 0, targetHY = 0;
canvas.addEventListener('mousemove', e => {
  if (isDragging) return;
  const rect = canvas.getBoundingClientRect();
  targetHX = ((e.clientY - rect.top) / rect.height - 0.5) * 0.08;
  targetHY = ((e.clientX - rect.left) / rect.width - 0.5) * 0.08;
});

// ── RESIZE ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── ANIMATE ──
let autoRotate = true;
canvas.addEventListener('mousedown', () => { autoRotate = false; });
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  if (!isDragging) {
    // Inertia decay
    velX *= 0.88;
    velY *= 0.88;
    rotX += velX;
    rotY += velY;
    if (autoRotate) rotY += 0.004;
    // Hover
    hoverX += (targetHX - hoverX) * 0.06;
    hoverY += (targetHY - hoverY) * 0.06;
  }

  group.rotation.y = rotY;
  group.rotation.x = rotX + hoverX;
  group.rotation.z = -hoverY * 0.3;

  // Gentle float
  group.position.y = -0.3 + Math.sin(t * 0.7) * 0.025;

  // Light pulse (subtle gold shimmer)
  rimLight.intensity = 1.1 + Math.sin(t * 1.3) * 0.15;

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
